[dependency-groups]
dev = [
    "prek>=0.2.24,<1.0.0",
    "zizmor>=1.25.2",
]

[tool.uv.workspace]
members = ["backend"]

[tool.typos.files]
extend-exclude = [
    "uv.lock",
]

[tool.typos.default]
extend-ignore-re = [
    # GitHub usernames in @mentions
    "@[a-zA-Z0-9](?:-?[a-zA-Z0-9])*",
    # Name of the package in the PR title
    "Bump certifi ",
]

[tool.typos.default.extend-identifiers]
alls = "alls"
