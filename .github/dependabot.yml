version: 2
updates:
  # GitHub Actions 工作流
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    commit-message:
      prefix: ⬆
    labels:
      - "internal"
      - "dependencies"
      - "github_actions"
    groups:
      github-actions:
        patterns:
          - "*"
  # Python uv 依赖
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    commit-message:
      prefix: ⬆
    labels: [dependencies, internal]
    groups:
      python-packages:
        patterns:
          - "*"
  # Docker 镜像
  - package-ecosystem: docker
    directories:
      - /backend
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    commit-message:
      prefix: ⬆
    groups:
      docker:
        patterns:
          - "*"
  # Docker Compose 配置
  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    commit-message:
      prefix: ⬆
    groups:
      docker-compose:
        patterns:
          - "*"
  # pre-commit 钩子
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    commit-message:
      prefix: ⬆
    labels:
      - "internal"
      - "dependencies"
      - "pre-commit"
    groups:
      pre-commit:
        patterns:
          - "*"
